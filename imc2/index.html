<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #resultado {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora de IMC</h1>
        
        <!-- Input da altura -->
        <label for="altura">Altura (em metros):</label>
        <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75">
        
        <!-- Input do peso -->
        <label for="peso">Peso (em kg):</label>
        <input type="number" id="peso" step="0.1" placeholder="Ex: 70">
        
        <!-- Botão de calcular -->
        <button onclick="calcularIMC()">Calcular IMC</button>
        
        <!-- Área do resultado -->
        <div id="resultado"></div>
    </div>

    <script>
        // Função principal para calcular o IMC
        function calcularIMC() {
            // Pega os valores dos inputs
            const altura = parseFloat(document.getElementById('altura').value);
            const peso = parseFloat(document.getElementById('peso').value);
            const resultado = document.getElementById('resultado');
            
            // Validação: verifica se os campos foram preenchidos corretamente
            if (!altura || !peso || altura <= 0 || peso <= 0) {
                resultado.innerHTML = "❌ Por favor, insira valores válidos!";
                resultado.style.color = "red";
                return;
            }
            
            // Cálculo do IMC
            const imc = peso / (altura * altura);
            
            // Interpretação do IMC
            let classificacao = "";
            if (imc < 18.5) {
                classificacao = "Abaixo do peso";
            } else if (imc < 24.9) {
                classificacao = "Peso normal";
            } else if (imc < 29.9) {
                classificacao = "Sobrepeso";
            } else if (imc < 34.9) {
                classificacao = "Obesidade grau I";
            } else if (imc < 39.9) {
                classificacao = "Obesidade grau II";
            } else {
                classificacao = "Obesidade grau III (Mórbida)";
            }
            
            // Exibe o resultado
            resultado.innerHTML = `
                Seu IMC é: <strong>${imc.toFixed(2)}</strong><br>
                Classificação: <strong>${classificacao}</strong>
            `;
            resultado.style.color = "#333";
        }
    </script>

</body>
</html>
